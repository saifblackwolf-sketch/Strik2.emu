workflows:
  m4-ultimate-build:
    name: STRIK2 M4 Direct Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: M4 Display Patch
        script: |
          # تعديل أبعاد الشاشة لنسبة 1.432f لتناسب الـ iPad Pro M4
          find . -name "GSRenderer.cpp" -exec sed -i '' 's/1.333f/1.432f/g' {} +
      - name: Build Emulator
        script: |
          # البحث عن أي ملف xcodeproj جاهز في كل المجلدات
          PROJ=$(find . -name "*.xcodeproj" -not -path "*/3rdparty/*" | head -n 1)
          if [ -z "$PROJ" ]; then 
            echo "No ready project found. Trying alternative method..."
            exit 1
          fi
          echo "Building found project: $PROJ"
          xcodebuild build -project "$PROJ" -scheme "iPSX2" -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO
    artifacts:
      - "**/*.ipa"
      - "**/*.app"