workflows:
  strik2-m4-build:
    name: Strik2.emu M4 Platform Bypass
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Create Required CMake Module
        script: |
          # إنشاء المجلد إذا لم يكن موجوداً
          mkdir -p src/cpp/cmake

          # إنشاء ملف Pcsx2Utils.cmake كامل المحتوى
          cat > src/cpp/cmake/Pcsx2Utils.cmake << 'EOF'
          # Pcsx2Utils.cmake - ضروري لبناء iPSX2 على iOS
          cmake_minimum_required(VERSION 3.16)

          # تجاوز التحقق من المنصة (دعم iOS)
          function(detect_operating_system)
              set(APPLE 1 PARENT_SCOPE)
              set(IOS 1 PARENT_SCOPE)
              set(UNIX 1 PARENT_SCOPE)
              set(CMAKE_SYSTEM_NAME "iOS" PARENT_SCOPE)
              message(STATUS "Platform override: iOS detected and forced")
          endfunction()

          # تعريف الدالة المطلوبة من CMakeLists.txt
          function(check_no_parenthesis_in_path path)
              # التحقق من وجود أقواس في المسار (غير مدعومة)
              if("${path}" MATCHES "[()]")
                  message(WARNING "Path contains parentheses: ${path}")
              endif()
          endfunction()

          # دوال أخرى محتملة يحتاجها المشروع (يمكن إضافتها حسب الحاجة)
          function(check_compiler_abi)
              # لا تفعل شيئاً، فقط للتجاوز
          endfunction()

          function(set_common_flags)
              # تعيين أعلام عامة
              if(APPLE)
                  add_compile_options(-fobjc-arc)
                  add_compile_options(-fembed-bitcode)
              endif()
          endfunction()
          EOF

          echo "✅ Pcsx2Utils.cmake created with required functions"

      - name: M4 Display Patch
        script: |
          # تعديل الأبعاد لتناسب شاشة iPad Pro M4
          FILE=$(find src -name "GSRenderer.cpp" 2>/dev/null | head -n 1)
          if [ -f "$FILE" ]; then
            sed -i '' 's/1.333f/1.432f/g' "$FILE"
            echo "✅ Display patch applied to $FILE"
          else
            echo "⚠️ GSRenderer.cpp not found, skipping display patch."
          fi

      - name: CMake Configure
        script: |
          # تنظيف أي بناء سابق
          rm -rf build/ios_device

          # تهيئة CMake مع إعدادات iOS
          cmake -S src/cpp -B build/ios_device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DiPSX2_REAL_DEVICE=ON \
            -DCMAKE_POLICY_DEFAULT_CMP0077=NEW \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED="NO" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED="NO" \
            -DCMAKE_MODULE_PATH="${PWD}/src/cpp/cmake"

          if [ $? -ne 0 ]; then
            echo "❌ CMake configuration failed"
            exit 1
          fi

          echo "✅ CMake Configure completed"
          echo "📁 Contents of build/ios_device:"
          ls -la build/ios_device/

      - name: Build and Package
        script: |
          # البحث عن ملف المشروع .xcodeproj
          PROJECT_FILE=$(find build/ios_device -name "*.xcodeproj" -maxdepth 2 | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "❌ No Xcode project found in build/ios_device"
            ls -la build/ios_device/
            exit 1
          fi

          echo "✅ Found project: $PROJECT_FILE"

          # محاولة بناء الهدف iPSX2، وإن فشل جرب بناء كل الأهداف
          xcodebuild -project "$PROJECT_FILE" -configuration Release -scheme iPSX2 -sdk iphoneos build || \
          xcodebuild -project "$PROJECT_FILE" -configuration Release -sdk iphoneos build

          if [ $? -ne 0 ]; then
            echo "❌ Build failed"
            exit 1
          fi

          # البحث عن ملف .app الناتج
          APP_PATH=$(find build/ios_device -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app bundle found after build"
            exit 1
          fi

          echo "✅ App found at: $APP_PATH"

          # إنشاء الـ IPA
          cd build/ios_device
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr iPSX2_M4_Final.ipa Payload/
          echo "✅ IPA created: $(pwd)/iPSX2_M4_Final.ipa"
          ls -lh iPSX2_M4_Final.ipa

    artifacts:
      - build/ios_device/*.ipa