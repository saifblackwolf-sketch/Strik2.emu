workflows:
  strik2-m4-build:
    name: Strik2.emu M4 Platform Bypass
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Inject and Patch Modules (Fixed)
        script: |
          # 1. جلب المكتبات الأصلية
          git clone --depth=1 https://github.com/PCSX2/pcsx2.git temp_pcsx2
          mkdir -p src/cpp/cmake
          cp -r temp_pcsx2/cmake/* src/cpp/cmake/

          # 2. التعديل الصحيح لملف Pcsx2Utils.cmake لقبول iOS
          # بدلاً من البحث عن النص الكامل، سنقوم بتعطيل التحقق إذا كان النظام iOS
          cat > src/cpp/cmake/PlatformiOS.cmake << 'EOF'
          # Override platform detection for iOS
          set(APPLE TRUE)
          set(IOS TRUE)
          set(CMAKE_SYSTEM_NAME "iOS")
          # منع رسالة الخطأ الخاصة بالمنصة غير المدعومة
          function(detect_operating_system)
              set(CMAKE_SYSTEM_NAME "iOS" PARENT_SCOPE)
              set(APPLE 1 PARENT_SCOPE)
              set(IOS 1 PARENT_SCOPE)
              set(UNIX 1 PARENT_SCOPE)
              message(STATUS "Platform override: Forcing iOS compatibility")
          endfunction()
          EOF
          
          # دمج التعديل مع الملف الأصلي
          echo "include(PlatformiOS)" >> src/cpp/cmake/Pcsx2Utils.cmake
          
          echo "Platform check bypassed successfully."

      - name: Patch CMakeLists.txt (Robust AWK Fix)
        script: |
          # التأكد من حقن المسار الصحيح للمكتبات الملحقة
          TARGET_FILE="src/cpp/CMakeLists.txt"
          
          # التحقق من وجود الملف قبل التعديل
          if [ -f "$TARGET_FILE" ]; then
            awk '
            /include\(Pcsx2Utils\)/ {
              print "list(APPEND CMAKE_MODULE_PATH \"${CMAKE_SOURCE_DIR}/cmake\")"
              print "include(Pcsx2Utils)"
              next
            }
            { print }
            ' "$TARGET_FILE" > temp && mv temp "$TARGET_FILE"
            echo "CMakeLists.txt patched."
          else
            echo "Warning: $TARGET_FILE not found, skipping patch."
          fi

      - name: M4 Display Patch
        script: |
          # تعديل الأبعاد لتناسب شاشة iPad Pro M4
          FILE=$(find src -name "GSRenderer.cpp" 2>/dev/null | head -n 1)
          if [ -f "$FILE" ]; then
            sed -i '' 's/1.333f/1.432f/g' "$FILE"
            echo "Display patch applied to $FILE"
          else
            echo "GSRenderer.cpp not found, skipping display patch."
          fi

      - name: CMake Configure (Fixed)
        script: |
          # تنظيف البناء السابق لتجنب التعارضات
          rm -rf build/ios_device
          
          # تشغيل CMake مع إعدادات iOS الصحيحة
          cmake -S src/cpp -B build/ios_device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DiPSX2_REAL_DEVICE=ON \
            -DCMAKE_POLICY_DEFAULT_CMP0077=NEW \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED="NO" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED="NO"
          
          echo "CMake Configure completed."

      - name: Build and Package
        script: |
          # بناء المشروع
          cmake --build build/ios_device --config Release --target iPSX2
          
          # التحقق من وجود ملف الـ .app
          APP_PATH="build/ios_device/Release-iphoneos/iPSX2.app"
          if [ -d "$APP_PATH" ]; then
            cd build/ios_device
            mkdir -p Payload
            cp -R Release-iphoneos/iPSX2.app Payload/
            zip -qr iPSX2_M4_Final.ipa Payload/
            echo "IPA created successfully: build/ios_device/iPSX2_M4_Final.ipa"
          else
            echo "Error: iPSX2.app not found at $APP_PATH"
            exit 1
          fi

    artifacts:
      - build/ios_device/*.ipa