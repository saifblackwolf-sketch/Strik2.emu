workflows:
  strik2-m4-build:
    name: Strik2.emu M4 Final Fix
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
      vars:
        # إضافة مسار المكتبات لضمان عثور CMake عليها
        CMAKE_MODULE_PATH: ${ROBOT_WORK_DIR}/src/cpp/cmake
    scripts:
      - name: Fetch Submodules
        script: |
          # حل مشكلة ملف Pcsx2Utils المفقود
          git submodule update --init --recursive

      - name: M4 Display Patch
        script: |
          # تطبيق نسبة 1.432f لتناسب شاشة iPad Pro M4
          FILE=$(find . -name "GSRenderer.cpp" | head -n 1)
          if [ -f "$FILE" ]; then
            sed -i '' 's/1.333f/1.432f/g' "$FILE"
          fi

      - name: CMake Configure
        script: |
          # حل مشكلة Unknown CMake command "check_no_parenthesis_in_path"
          # عن طريق توجيه الـ CMake للمجلد الصحيح وتعريف الـ Modules
          cmake -S src/cpp -B build/ios_device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DiPSX2_REAL_DEVICE=ON

      - name: Build and Package
        script: |
          # بناء المشروع وتجميع الـ IPA
          cmake --build build/ios_device --target iPSX2 --config Release
          cd build/ios_device
          mkdir -p Payload
          cp -R Release-iphoneos/iPSX2.app Payload/
          zip -qr iPSX2_M4_Final.ipa Payload/

    artifacts:
      - build/ios_device/*.ipa
