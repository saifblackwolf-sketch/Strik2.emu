workflows:
  strik2-m4-build:
    name: Strik2.emu M4 Professional Fix
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Fetch Submodules (The Core Fix)
        script: |
          # حل المشكلة الأولى: جلب ملف Pcsx2Utils والمكتبات الناقصة
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: M4 Display Patch
        script: |
          # تطبيق نسبة 1.432f لتناسب شاشة iPad Pro M4
          FILE=$(find . -name "GSRenderer.cpp" | head -n 1)
          if [ -f "$FILE" ]; then
            sed -i '' 's/1.333f/1.432f/g' "$FILE"
          fi

      - name: CMake Configure (With Module Path)
        script: |
          # حل المشكلة الثانية: توجيه CMake لمجلد الموديولات ليتعرف على الأوامر
          # تم دمج الحل الأصح بإضافة مسار cmake الخاص بالمطور
          cmake -S src/cpp -B build/ios_device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DiPSX2_REAL_DEVICE=ON \
            -DCMAKE_MODULE_PATH="cmake"

      - name: Build and Package
        script: |
          # تنفيذ بناء الـ Target الرسمي iPSX2
          cmake --build build/ios_device --target iPSX2 --config Release
          cd build/ios_device
          mkdir -p Payload
          cp -R Release-iphoneos/iPSX2.app Payload/
          zip -qr iPSX2_M4_Final.ipa Payload/

    artifacts:
      - build/ios_device/*.ipa
