workflows:
  m4-ultimate-build:
    name: STRIK2 M4 Clean Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: M4 Display Patch
        script: |
          # تطبيق نسبة 1.432f لتناسب شاشة iPad Pro M4
          find . -name "GSRenderer.cpp" -exec sed -i '' 's/1.333f/1.432f/g' {} +
          
      - name: Generate and Build
        script: |
          # الدخول لمجلد الأكواد الأساسي
          cd src/cpp
          mkdir build && cd build
          
          # محاولة توليد المشروع مع تجاهل الأخطاء غير المؤثرة
          cmake .. -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DPCSX2_CORE=ON
          
          # البحث عن ملف المشروع وبناؤه
          PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          xcodebuild build \
            -project "$PROJ" \
            -scheme "iPSX2" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - src/cpp/build/**/*.app
      - src/cpp/build/**/*.ipa
