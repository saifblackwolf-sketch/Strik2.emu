workflows:
  strik2-m4-build:
    name: Strik2.emu M4 Pro Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: M4 Display Patch
        script: |
          # تطبيق نسبة 1.432f لتناسب أبعاد شاشة الـ M4
          FILE=$(find . -name "GSRenderer.cpp" | head -n 1)
          if [ -f "$FILE" ]; then
            sed -i '' 's/1.333f/1.432f/g' "$FILE"
            echo "M4 Patch applied successfully"
          fi

      - name: Generate Xcode Project (CMake)
        script: |
          # الدخول للمجلد الذي يحتوي على CMakeLists.txt
          # بناءً على صورك، الملف موجود داخل src/cpp
          cmake -S src/cpp -B build/ios_device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DiPSX2_REAL_DEVICE=ON

      - name: Build Unsigned IPA
        script: |
          # الانتقال لمجلد البناء الناتج
          cd build/ios_device
          
          # بناء التطبيق باستخدام الأوامر الأصلية
          xcodebuild build \
            -project "iPSX2.xcodeproj" \
            -target "iPSX2" \
            -configuration "Release" \
            -sdk "iphoneos" \
            CODE_SIGNING_ALLOWED=NO
          
          # تجميع الـ IPA يدوياً كما في تعليمات المطور
          mkdir -p Payload
          cp -R Release-iphoneos/iPSX2.app Payload/
          zip -qr iPSX2_M4_Final.ipa Payload/

    artifacts:
      - build/ios_device/*.ipa
