workflows:
  strik2-m4-build:
    name: Strik2.emu M4 Professional Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: M4 Display Patch
        script: |
          # تطبيق نسبة 1.432f لتناسب شاشة iPad Pro M4 فائقة الدقة
          FILE=$(find . -name "GSRenderer.cpp" | head -n 1)
          if [ -f "$FILE" ]; then
            sed -i '' 's/1.333f/1.432f/g' "$FILE"
            echo "M4 Patch applied to $FILE"
          fi

      - name: CMake Configure (From Original Script)
        script: |
          # استخدام الإعدادات الأصلية للمطور لضمان استقرار الـ 60 FPS
          cd src/cpp
          mkdir -p build && cd build
          cmake .. -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DiPSX2_REAL_DEVICE=ON

      - name: Build Unsigned IPA
        script: |
          cd src/cpp/build
          # بناء المشروع باستخدام اسم الـ Target الأصلي iPSX2
          xcodebuild build \
            -project "iPSX2.xcodeproj" \
            -target "iPSX2" \
            -configuration "Release" \
            -sdk "iphoneos" \
            CODE_SIGNING_ALLOWED=NO
          
          # تجميع ملف الـ IPA يدوياً كما يفعل المطور
          mkdir -p Payload
          cp -R Release-iphoneos/iPSX2.app Payload/
          zip -qr iPSX2_M4.ipa Payload/

    artifacts:
      - src/cpp/build/*.ipa
