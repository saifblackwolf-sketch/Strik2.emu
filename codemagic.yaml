workflows:
  strik2-m4-build:
    name: Strik2.emu M4 Ultimate Fix
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Inject Full CMake Modules (Cleanest Fix)
        script: |
          # حل مشكلة المسارات والمكتبات المفقودة نهائياً
          git clone --depth=1 https://github.com/PCSX2/pcsx2.git temp_pcsx2
          mkdir -p src/cpp/cmake
          cp -r temp_pcsx2/cmake/* src/cpp/cmake/
          echo "All CMake modules injected into src/cpp/cmake"

      - name: M4 Display Patch
        script: |
          # تطبيق نسبة 1.432f لتناسب شاشة iPad Pro M4
          FILE=$(find . -name "GSRenderer.cpp" | head -n 1)
          if [ -f "$FILE" ]; then
            sed -i '' 's/1.333f/1.432f/g' "$FILE"
          fi

      - name: CMake Configure (Corrected Path)
        script: |
          # تصحيح المسار ليكون src/cpp/cmake كما حللت بدقة
          cmake -S src/cpp -B build/ios_device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DiPSX2_REAL_DEVICE=ON \
            -DCMAKE_MODULE_PATH="src/cpp/cmake"

      - name: Build and Package
        script: |
          # بناء المحاكي وتجميع الـ IPA النهائي
          cmake --build build/ios_device --target iPSX2 --config Release
          cd build/ios_device
          mkdir -p Payload
          cp -R Release-iphoneos/iPSX2.app Payload/
          zip -qr iPSX2_M4_Final.ipa Payload/

    artifacts:
      - build/ios_device/*.ipa
