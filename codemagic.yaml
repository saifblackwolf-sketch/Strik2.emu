workflows:
  strik2-m4-build:
    name: Strik2.emu M4 Platform Bypass
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Inject and Patch Modules (Fixed)
        script: |
          # جلب المكتبات الأصلية
          git clone --depth=1 https://github.com/PCSX2/pcsx2.git temp_pcsx2
          mkdir -p src/cpp/cmake
          cp -r temp_pcsx2/cmake/* src/cpp/cmake/

          # إنشاء ملف تجاوز المنصة
          cat > src/cpp/cmake/PlatformiOS.cmake << 'EOF'
          # Override platform detection for iOS
          set(APPLE TRUE)
          set(IOS TRUE)
          set(CMAKE_SYSTEM_NAME "iOS")
          function(detect_operating_system)
              set(CMAKE_SYSTEM_NAME "iOS" PARENT_SCOPE)
              set(APPLE 1 PARENT_SCOPE)
              set(IOS 1 PARENT_SCOPE)
              set(UNIX 1 PARENT_SCOPE)
              message(STATUS "Platform override: Forcing iOS compatibility")
          endfunction()
          EOF
          
          # دمج التعديل مع الملف الأصلي
          if [ -f src/cpp/cmake/Pcsx2Utils.cmake ]; then
            echo "include(PlatformiOS)" >> src/cpp/cmake/Pcsx2Utils.cmake
          else
            cp src/cpp/cmake/PlatformiOS.cmake src/cpp/cmake/Pcsx2Utils.cmake
          fi
          
          echo "Platform check bypassed."

      - name: Patch CMakeLists.txt
        script: |
          TARGET_FILE="src/cpp/CMakeLists.txt"
          if [ -f "$TARGET_FILE" ]; then
            # إضافة مسار الوحدات إذا لم يكن موجوداً
            if ! grep -q "CMAKE_MODULE_PATH" "$TARGET_FILE"; then
              sed -i '' '1i\
          list(APPEND CMAKE_MODULE_PATH "${CMAKE_SOURCE_DIR}/cmake")
          ' "$TARGET_FILE"
            fi
            echo "CMakeLists.txt patched."
          else
            echo "Error: $TARGET_FILE not found"
            exit 1
          fi

      - name: M4 Display Patch
        script: |
          FILE=$(find src -name "GSRenderer.cpp" 2>/dev/null | head -n 1)
          if [ -f "$FILE" ]; then
            sed -i '' 's/1.333f/1.432f/g' "$FILE"
            echo "Display patch applied to $FILE"
          else
            echo "GSRenderer.cpp not found, skipping display patch."
          fi

      - name: CMake Configure
        script: |
          # تنظيف أي بناء سابق
          rm -rf build/ios_device
          
          # تهيئة CMake مع إعدادات iOS
          cmake -S src/cpp -B build/ios_device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DiPSX2_REAL_DEVICE=ON \
            -DCMAKE_POLICY_DEFAULT_CMP0077=NEW \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED="NO" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED="NO"
          
          # التحقق من نجاح التهيئة
          if [ $? -ne 0 ]; then
            echo "CMake configuration failed"
            exit 1
          fi
          
          echo "CMake Configure completed."
          echo "Contents of build/ios_device:"
          ls -la build/ios_device/

      - name: Build and Package
        script: |
          # البحث عن ملف المشروع .xcodeproj
          PROJECT_FILE=$(find build/ios_device -name "*.xcodeproj" -maxdepth 2 | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "Error: No Xcode project found in build/ios_device"
            ls -la build/ios_device/
            exit 1
          fi
          
          echo "Found project: $PROJECT_FILE"
          
          # محاولة بناء الهدف iPSX2
          xcodebuild -project "$PROJECT_FILE" -configuration Release -scheme iPSX2 -sdk iphoneos build || \
          xcodebuild -project "$PROJECT_FILE" -configuration Release -sdk iphoneos build
          
          if [ $? -ne 0 ]; then
            echo "Build failed"
            exit 1
          fi
          
          # البحث عن ملف .app الناتج
          APP_PATH=$(find build/ios_device -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found after build"
            exit 1
          fi
          
          echo "App found at: $APP_PATH"
          
          # إنشاء الـ IPA
          cd build/ios_device
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr iPSX2_M4_Final.ipa Payload/
          echo "IPA created: $(pwd)/iPSX2_M4_Final.ipa"
          
          # عرض حجم الملف
          ls -lh iPSX2_M4_Final.ipa

    artifacts:
      - build/ios_device/*.ipa