workflows:
  strik2-m4-build:
    name: Strik2.emu M4 Official Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Fetch Submodules
        script: |
          # هذا الأمر سيجلب ملف Pcsx2Utils والمكتبات الناقصة التي تسببت في الخطأ
          git submodule update --init --recursive

      - name: M4 Display Patch
        script: |
          # تطبيق نسبة 1.432f لتناسب شاشة iPad Pro M4
          FILE=$(find . -name "GSRenderer.cpp" | head -n 1)
          if [ -f "$FILE" ]; then
            sed -i '' 's/1.333f/1.432f/g' "$FILE"
          fi

      - name: CMake Configure
        script: |
          # توجيه السيرفر للمجلد الصحيح src/cpp كما هو موضح في هيكلية ملفاتك
          cmake -S src/cpp -B build/ios_device -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DiPSX2_REAL_DEVICE=ON

      - name: Build and Package
        script: |
          # بناء التطبيق وتجهيز الـ IPA
          cmake --build build/ios_device --target iPSX2 --config Release
          cd build/ios_device
          mkdir -p Payload
          cp -R Release-iphoneos/iPSX2.app Payload/
          zip -qr iPSX2_M4_Strik2.ipa Payload/

    artifacts:
      - build/ios_device/*.ipa
