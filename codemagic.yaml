workflows:
  m4-ultimate-build:
    name: Strik2.emu M4 Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: M4 Display Patch
        script: |
          # تطبيق نسبة 1.432f لتناسب شاشة iPad Pro M4
          find . -name "GSRenderer.cpp" -exec sed -i '' 's/1.333f/1.432f/g' {} +
          
      - name: Generate Xcode Project
        script: |
          # الدخول لمجلد الأكواد وصناعة المشروع
          cd src/cpp
          mkdir -p build && cd build
          cmake .. -G Xcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos
          
      - name: Dynamic Build IPA
        script: |
          cd src/cpp/build
          # استخراج اسم المشروع والـ Scheme تلقائياً مهما كان الاسم
          PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME=$(xcodebuild -list -project "$PROJ" | awk '/Schemes:/ {found=1; next} found {print $1; exit}')
          
          echo "Building: $PROJ with Scheme: $SCHEME"
          
          xcodebuild build \
            -project "$PROJ" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - src/cpp/build/**/*.app
      - src/cpp/build/**/*.ipa
